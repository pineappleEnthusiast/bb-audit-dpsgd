name: bb_audit_dpsgd_arm64
channels:
  - pytorch
  - conda-forge
  - nvidia
  - defaults
dependencies:
  # Base dependencies
  - python=3.10
  - pip
  - numpy
  - scipy
  - matplotlib
  - pandas
  - jupyter
  - tqdm
  - pillow
  - pyyaml
  - h5py
  - requests
  - seaborn
  - scikit-learn
  
  # PyTorch with CUDA 11.8 support for ARM64 (latest stable for ARM64 as of 2024-09)
  - pytorch=2.0.1=py3.10_cuda11.8*  # ARM64 compatible version
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8
  
  # CUDA toolkit for ARM64
  - cudatoolkit=11.8
  - cudnn=8.9
  - nccl=2.12.12  # Version available for ARM64 with CUDA 11.8
  
  # Additional ML/DL libraries
  - tensorboard
  - tensorboardx
  - torchinfo
  - torchmetrics
  
  # For data loading
  - numba
  - nvidia-nvtx
  - nvtx
  
  # For visualization
  - opencv
  - imageio
  - plotly
  
  # For development
  - ipykernel
  - ipywidgets
  - jupyter_contrib_nbextensions
  - black
  - flake8
  - mypy
  - pytest

  # Install pip packages
  - pip:
    - torch-privacymodel  # If needed for DP-SGD
    - opacus  # If using Opacus for differential privacy
    - tensorboard-plugin-profile  # For PyTorch profiler
    - torch-tb-profiler  # For PyTorch TensorBoard profiler plugin

# Environment variables for CUDA
variables:
  LD_LIBRARY_PATH: ${CONDA_PREFIX}/lib:${LD_LIBRARY_PATH}
  CUDA_HOME: ${CONDA_PREFIX}
  CUDA_PATH: ${CONDA_PREFIX}
  PATH: ${CONDA_PREFIX}/bin:${PATH}

name: bb_audit_dpsgd
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.10
  - pip
  - setuptools
  - wheel

  # Scientific stack
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - statsmodels
  - matplotlib
  - matplotlib-inline
  - seaborn
  - networkx
  - sympy
  - opt_einsum
  - joblib
  - threadpoolctl

  # PyTorch (CPU or MPS for Mac)
  - pytorch
  - torchvision
  - torchaudio

  # Jupyter / IPython
  - ipython
  - ipykernel
  - jupyter_client
  - jupyter_core
  - prompt-toolkit
  - pygments
  - tornado
  - decorator
  - stack_data
  - traitlets

  # Utilities
  - pyyaml
  - requests
  - tqdm
  - packaging
  - charset-normalizer
  - urllib3
  - colorama
  - filelock
  - six
  - pytz
  - python-dateutil
  - python-tzdata
  - markupsafe
  - zipp
  - importlib-metadata
  - platformdirs

  # Optional: OpenBLAS backend
  - openblas
  - blas=*=openblas
  - libblas=*=openblas
  - libcblas=*=openblas
  - liblapack=*=openblas

  # Optional visualization / fonts
  - freetype
  - fonttools
  - cairo

  # pip packages
  - pip:
      - absl-py==1.4.0
      - annotated-types==0.7.0
      - attrs==24.3.0
      - dm-tree==0.1.8
      - dp-accounting==0.4.4
      - multimethod==2.0
      - numpy==1.26.4
      - patsy==1.0.1
      - privacy-estimates==0.1.0.post1
      - pydantic==2.10.5
      - pydantic-cli==9.1.0
      - pydantic-core==2.27.2
      - statsmodels==0.14.4
